        style: simple
      - description: The identifier for the data resource
        explode: false
        in: path
        name: data-id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/__entity_collection___entity_id__data__data_id__put_request'
        description: "Request: Write a data value data to an entity"
        required: true
      responses:
