openapi: 3.1.0
info:
  contact:
    url: https://www.asam.net/project-detail/sovd-service-oriented-vehicle-diagnostics/
  description: Definition of ASAM SOVD API
  license:
    name: Licensing Terms for Grant of Rights to Use ASAM Products
    url: https://www.asam.net/license/
  title: Service-Oriented Vehicle Diagnostic API
  version: 1.0.0
servers:
- url: https://sovd.server/v1
tags:
- description: Methods for data resource read / write access
  name: data-retrieval
- description: Methods for configuration
  name: configurations
- description: Methods for handling of bulk-data
  name: bulk-data
- description: Methods for logging
  name: logging
- description: Methods for locking
  name: locking
- description: Methods for access to cpability description content
  name: capabilities
- description: Methods for fault handling
  name: fault-handling
- description: Methods for software updates
  name: updates
- description: Methods for discovering of entities and resources
  name: discovery
- description: Methods for control of operations
  name: operations-control
- description: Methods for support of target modes
  name: target-modes
paths:
  /{any-path}/docs:
    get:
      description: "For entities, resources, and resource collections, a corresponding\
        \ online capability description can be requested at the SOVD API. The resulting\
        \ online capability description is a self-contained, valid OpenAPI specification.\
        \ The description contains information which refers to the creation, reading,\
        \ updating or deleting of the respective element and its direct child elements\
        \ as defined by the SOVD standard. An online capability description is requested\
        \ for a data resource /{entity-path}/data/{data-id} via GET /{entity-path}/data/{data-id}/docs.\
        \ For example, to enrich the responses with additional details such as the\
        \ underlying schema of the response using the “include-schema” query parameter\
        \ on the request. Moreover, for each supported HTTP method all defined HTTP\
        \ response status codes are documented together with the data model of the\
        \ resulting response payloads."
      parameters:
      - description: "Path to entity, resource or resource collection for which to\
          \ request the online capability description."
        explode: false
        in: path
        name: any-path
        required: true
        schema:
          title: id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: https://raw.githubusercontent.com/OAI/OpenAPI-Specification/main/schemas/v3.1/schema.yaml
          description: The online capability description of the underlying resource
            in form of an OpenAPI specification in JSON document format.
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/__any_path__docs_get_default_response'
          description: An unexpected error occurred.
      tags:
      - capabilities
