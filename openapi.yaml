  /{entity-collection}/{entity-id}/data:
    get:
      parameters:
      - description: Path to an entity collection
        explode: false
        in: path
        name: entity-collection
        required: true
        schema:
          enum:
          - Area
          - Component
          - App
          - Function
          type: string
        style: simple
      - description: ID of an entity
        explode: false
        in: path
        name: entity-id
        required: true
        schema:
          type: string
        style: simple
      - description: "Filters the available elements based on the group they belong\
          \ to. If an element belongs to multiple groups, it is included if the group\
          \ is part of these multiple groups."
        explode: true
        in: query
        name: groups
        required: false
        schema:
          title: id
          type: string
        style: form
      - description: Filters the available elements based on their category
        explode: true
        in: query
        name: category
        required: false
        schema:
          items:
            example: currentData
            pattern: "^[A-Za-z0-9_-]+$"
            type: string
          type: array
        style: form
      - description: "Specifies whether the response should include schema information\
          \ or not. Default: false"
        explode: true
        in: query
        name: include-schema
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/__entity_collection___entity_id__data_get_200_response'
          description: Retrieve list of all data provided by the entity.
