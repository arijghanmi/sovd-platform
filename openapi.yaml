  /{entity-collection}/{entity-id}/configurations/{configuration-id}:
    get:
      description: "This method is used to read a configuration from an entity, which\
        \ can either be * bulk data or * parameter data (MIME type: application/json)\
        \ The SOVD standard follows the server-driven content negotiation where the\
        \ client defines its preferences using the Accept request header. If no Accept\
        \ request header is provided, the SOVD server returns a default representation."
      parameters:
      - description: Path to an entity collection
        explode: false
        in: path
        name: entity-collection
        required: true
        schema:
          enum:
          - Area
          - Component
          - App
          - Function
          type: string
        style: simple
      - description: ID of an entity
        explode: false
        in: path
        name: entity-id
        required: true
        schema:
          type: string
        style: simple
      - description: The identifier for the configuration
        explode: false
        in: path
        name: configuration-id
        required: true
        schema:
          title: id
          type: string
        style: simple
      - description: "Specifies whether the response should include schema information\
          \ or not. Default: false"
        explode: true
        in: query
        name: include-schema
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                id: ALKConfig
                data:
                  MaximumSpeed: 150
                  MinimumDistanceToLine: 15
                  EmergencyLaneDistanceToLine: 5
                schema:
                  type: object
                  properties:
                    MaximumSpeed:
                      type: integer
                      format: int32
                      minimum: 0
                      maximum: 250
                      x-sovd-unit:
                        display_name: km/h
                        physical_dimension:
                          length: 1
                          time: -1
                    MinimumDistanceToLine:
                      type: number
                      format: float
                      minimum: 10
                      maximum: 20
                      x-sovd-unit:
                        display_name: cm
                        physical_dimension:
                          length: 1
                    EmergencyLaneDistanceToLine:
                      type: number
                      format: float
                      minimum: 5
                      maximum: 10
                      x-sovd-unit:
                        display_name: cm
                        physical_dimension:
                          length: 1
              schema:
                $ref: '#/components/schemas/__entity_collection___entity_id__data_lists__data_list_id__get_200_response_items_inner'
            '*/*':
              examples:
                FormData:
                  description: "Example using \"Content-Type: multipart/form-data;\
                    \ boundary=formdataboundary\""
                  value: |-
                    --formdataboundary Content-Disposition: form-data; name="signature" Content-Type: application/json { "signature": "84e0982a082024fac464bc5eb69c0745", }
                    --formdataboundary Content-Disposition: form-data; name="ObjectRecognitionModel"; Content-Type: application/octet-stream [4D61792074686520666F726365206265207769746820796F75210D0A] --formdataboundary
              schema:
                description: "The content of the response body is OEM specific. Depending\
                  \ on the implementation, the transferred file can use multipart/signed,\
                  \ multipart/form-data with security parameters in a JSON object,\
                  \ or simply application/octet-stream (if it is not confidential\
                  \ information)."
                format: binary
                type: string
          description: "Response: Read Configurations"
        "406":
          description: "bulk data: The configuration cannot be provided in the requested\
            \ MIME type. parameter data: The configuration cannot be provided as parameter\
            \ data, i.e., the configuration cannot be provided as JSON."
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/__any_path__docs_get_default_response'
          description: An unexpected error occurred.
      tags:
      - configurations
    put:
      description: "This method is used to write a configuration to an entity, which\
        \ can either be • bulk data, or • parameter data (MIME type: application/json)\
        \ The SOVD client shall tell the SOVD server in the Content-Type header, which\
        \ MIME type is written to it."
      parameters:
      - description: Path to an entity collection
        explode: false
        in: path
        name: entity-collection
        required: true
        schema:
          enum:
          - Area
          - Component
          - App
          - Function
          type: string
        style: simple
      - description: ID of an entity
        explode: false
        in: path
        name: entity-id
        required: true
        schema:
          type: string
        style: simple
      - description: The identifier for the configuration
        explode: false
        in: path
        name: configuration-id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/__entity_collection___entity_id__configurations__configuration_id__put_request'
          '*/*':
            examples:
              FormData:
                description: "Example using \"Content-Type: multipart/form-data; boundary=formdataboundary\""
                value: |-
                  --formdataboundary Content-Disposition: form-data; name="signature" Content-Type: application/json {
