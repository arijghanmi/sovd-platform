          content:
            application/json:
              schema:
                $ref: '#/components/schemas/__entity_collection___entity_id__locks_get_200_response'
          description: The request was successful.
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/__any_path__docs_get_default_response'
          description: An unexpected error occurred.
      tags:
      - locking
    post:
      description: "This method acquires a lock from the SOVD server for the given\
        \ entity to reserve its resources for exclusive access of a single SOVD client,\
        \ i.e., prevent other SOVD clients from operating on the resources in parallel.\
        \ Any further requests against the SOVD API towards controlling an operation\
        \ (actuators, routines, and input control), e.g., start the execution of an\
        \ operation, is rejected by the SOVD server if the required lock is not acquired\
        \ by the same SOVD client. Once the lock is not required anymore, the SOVD\
        \ client can delete the created lock resource by a corresponding DELETE request.\
        \ In addition, an SOVD client shall provide a relative expiration time after\
        \ which the SOVD server should release the lock automatically. The SOVD server\
        \ might reject the requested expiration time if it is too long. As a result,\
        \ the SOVD server deletes the corresponding lock resource."
      parameters:
      - description: Path to an entity collection
        explode: false
        in: path
        name: entity-collection
        required: true
        schema:
          enum:
          - Area
          - Component
          - App
          - Function
          type: string
        style: simple
      - description: ID of an entity
        explode: false
        in: path
        name: entity-id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/__entity_collection___entity_id__locks_post_request'
        description: Request body - Acquire a lock on an entity
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/__entity_collection___entity_id__locks_post_201_response'
          description: The SOVD server has successfully created a new lock resource
            and acquired a lock on all relevant resources.
          headers:
            Location:
              description: "The following header redirects the SOVD client for requesting\
                \ the status: Location: /{entity-path}/locks/{lock-id}"
              example: https://sovd.server/v1/components/PowerSteering/locks/15c3e824-8278-44e1-b0b2-3bc16e4522f2
              explode: false
              schema:
                format: uri-reference
                type: string
              style: simple
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/__any_path__docs_get_default_response'
          description: The SOVD server rejected the creation of the lock resource.
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/__any_path__docs_get_default_response'
          description: An unexpected error occurred.
      tags:
      - locking
